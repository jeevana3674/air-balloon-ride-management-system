<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Air Balloon Ride Management System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>🎈 AIR BALLOON RIDE MANAGEMENT SYSTEM</h1>
  </div>

  <!-- MAIN CONTAINER -->
  <div class="container">

    <!-- LOGIN BUTTONS -->
    <div class="button-group">
      <button onclick="showUser()">User Login</button>
      <button onclick="showAdmin()">Admin Login</button>
    </div>

    <!-- USER LOGIN -->
    <div id="userLogin" class="login-box hidden">
      <h2>User Login</h2>

      <input type="text" id="phone" maxlength="10" placeholder="Enter 10 Digit Phone Number">
      <button onclick="sendOTP()">Send OTP</button>

      <br><br>

      <input type="text" id="otp" placeholder="Enter OTP">
      <button onclick="verifyOTP()">Verify</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLogin" class="login-box hidden">
      <h2>Admin Login</h2>

      <input type="text" id="adminUser" placeholder="Username (No Spaces)">
      <input type="password" id="adminPass" placeholder="Password (Special + Number)">
      <button onclick="adminLogin()">Login</button>
    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>

</body>
</html>
